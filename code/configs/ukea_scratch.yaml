# ─────────────────────────────────────────────────────────────────────────────
# configs/ukea_scratch.yaml  —  UKEA urban catchment (LarNO benchmark) training
#
# Usage
#   Convert data first (download from https://holmescao.github.io/datasets/LarNO):
#     python tools/convert_larfno_data.py --dataset ukea \
#         --larfno_root /path/to/larno/ukea \
#         --dst_root ../data/ukea_8m_5min
#
#   Single-GPU:
#     python main.py  --exp_config configs/ukea_scratch.yaml
#     python test.py  --exp_config configs/ukea_scratch.yaml --timestamp <ts>
#
#   Multi-GPU (DDP, Linux only — NCCL backend):
#     CUDA_VISIBLE_DEVICES=0,1 torchrun --nproc_per_node=2 main.py \
#         --exp_config configs/ukea_scratch.yaml
#     # Set batch_size = N_GPUs (e.g. 2 here); effective batch = batch_size × N_GPUs.
#     # After training, run inference with the same single-GPU command above.
#
# Dataset:  LarNO UKEA (ukea_8m_5min) — 52×120 grid, 8 m, T=36, 5-min steps
#   • 8  training events  (r100y / r200y / r300y / r500y variants)
#   • 12 test events      (remaining UKEA events)
#   • Spatial rainfall   (T, H, W) — pre-aggregated from 1-min to 5-min
#   • Grid: original 50×120, padded to 52×120 (multiples of 4 for AvgPool2d)
#   • Duration: 36 × 5 min = 3 h  (d3h design-storm events)
#
# Training: ~2 h on a single RTX 4090 (1000 epochs)
# VRAM:     ≥ 8 GB
#
# Normalization notes (calibrated from benchmark data):
#   rain_max        = 40.0 mm/5min  (observed max: 32.11 mm/5min; +25% margin)
#   cumsum_rain_max = 300.0 mm      (observed max cumsum: ~276.5 mm)
#   flood_max       = 5000 mm       (max observed depth: ~2700 mm)
# ─────────────────────────────────────────────────────────────────────────────

# ── Dataset ───────────────────────────────────────────────────────────────────
data_root: ../data/ukea_8m_5min   # path relative to the code/ directory

# Custom event lists (relative to the code/ directory)
train_list_file: ./src/lib/dataset/ukea_train.txt
test_list_file:  ./src/lib/dataset/ukea_test.txt

input_height: 52    # original 50 rows padded to 52 (multiple of 4)
input_width:  120

# Rainfall history: 6 × 5-min steps = 30-min lookback
# Input channels = 6*2+3 = 15
historical_nums: 6

# Normalization constants — calibrated for LarFNO UKEA design storms (5-min)
flood_max:       5000    # mm — upper bound for flood depth normalisation
rain_max:          10.0  # mm/5min — official data max 7.26; +38% margin
cumsum_rain_max:  150.0  # mm — official data cumsum max 107; +40% margin
flood_thres:      150.0  # mm — wet/dry classification threshold (0.15 m)

# Timestep indices for spatial snapshots during inference (T=36, 5-min intervals)
# → t=0 (0 min), t=8 (40 min), t=17 (85 min ≈ 1.5 h), t=35 (175 min ≈ 3 h)
viz_time_points: [0, 8, 17, 35]

# ── Training schedule ─────────────────────────────────────────────────────────
epochs:      1000
batch_size:  1     # per-GPU batch size; for N-GPU DDP set to N (effective = batch_size × N_GPUs)
random_seed: 42
num_workers: 4    # set to 0 on Windows if you get DataLoader errors

# ── Sliding Window Pre-warming (SWP) ──────────────────────────────────────────
# T=36 steps. seq_num=12: 3 gradient windows per event.
seq_num:          12
window_size:      36
duration:         36
train_event:      true
all_seq_train:    false
full_window_size: false
wind_random:      true
prewarming: false

# ── Optimizer ─────────────────────────────────────────────────────────────────
lr:            0.01
lr_min:        0.0001
schedule_name: WarmUpCosineAnneal
warm_up_iter:  5
patience:      10
factor:        0.9
grad_clip:     1.0    # clip L2 gradient norm

# ── Loss ──────────────────────────────────────────────────────────────────────
loss_name: FocalBCE_and_WMSE
reduction: mean
cls_thred: 0.5

# ── Model ─────────────────────────────────────────────────────────────────────
use_checkpoint: false   # not needed for small 52×120 grid

# ── Runtime ───────────────────────────────────────────────────────────────────
resume: false
test:   true
