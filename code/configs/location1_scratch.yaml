# ─────────────────────────────────────────────────────────────────────────────
# configs/location1_scratch.yaml  —  UrbanFlood24 location1 full-resolution training
#
# Usage
#   Single-GPU:
#     python main.py  --exp_config configs/location1_scratch.yaml
#     python test.py  --exp_config configs/location1_scratch.yaml --timestamp <ts>
#
#   Multi-GPU (DDP, Linux only — NCCL backend):
#     CUDA_VISIBLE_DEVICES=0,1 torchrun --nproc_per_node=2 main.py \
#         --exp_config configs/location1_scratch.yaml
#     # Set batch_size = N_GPUs (e.g. 2 here); effective batch = batch_size × N_GPUs.
#     # After training, run inference with the same single-GPU command above.
#
# Dataset:  UrbanFlood24 location1 — 500×500 grid, 2 m, T=360, 10-min steps
#   • 8 training events  (design rainfall, r-prefix)
#   • 4 test events      (design rainfall, r-prefix)
#   • Scalar rainfall    (T,) — spatially uniform design storms
#
# Training: ~6–12 h on a single RTX 4090 (1000 epochs)
# VRAM:     ≥ 16 GB  (use_checkpoint: true for gradient checkpointing)
# ─────────────────────────────────────────────────────────────────────────────

# ── Dataset ───────────────────────────────────────────────────────────────────
data_root: ../data/urbanflood24

train_list_file: ./src/lib/dataset/location1_train.txt
test_list_file:  ./src/lib/dataset/location1_test.txt

input_height: 500
input_width:  500

# Rainfall history: 30 × 10-min steps = 300-min (5-hour) lookback
# Input channels = 30*2+3 = 63
historical_nums: 30

# Normalization constants — calibrated for UrbanFlood24 design storms
flood_max:       5000
rain_max:          6.0
cumsum_rain_max:  250.0
flood_thres:      150.0

# Timestep indices for spatial snapshots during inference (T=360, 10-min intervals)
# → t=0 (0 min), t=119 (1190 min), t=239 (2390 min), t=359 (3590 min)
viz_time_points: [0, 119, 239, 359]

# ── Training schedule ─────────────────────────────────────────────────────────
epochs:      1000
batch_size:  1     # per-GPU batch size; for N-GPU DDP set to N (effective = batch_size × N_GPUs)
random_seed: 42
num_workers: 4

# ── Sliding Window Pre-warming (SWP) ──────────────────────────────────────────
# T=360 steps; each epoch trains on a random 36-step window (seq_num=12: 3 backward passes).
# Over 1000 epochs with random window starts, the full 360-step sequence is covered.
seq_num:          12
window_size:      36
duration:         360
train_event:      true
all_seq_train:    false
full_window_size: false
wind_random:      true
prewarming: false

# ── Optimizer ─────────────────────────────────────────────────────────────────
lr:            0.01
lr_min:        0.0001
schedule_name: WarmUpCosineAnneal
warm_up_iter:  10
patience:      10
factor:        0.9

# ── Loss ──────────────────────────────────────────────────────────────────────
loss_name: FocalBCE_and_WMSE
reduction: mean
cls_thred: 0.5

# ── Model ─────────────────────────────────────────────────────────────────────
use_checkpoint: true   # required for 500×500 grid to fit in GPU memory

# ── Runtime ───────────────────────────────────────────────────────────────────
resume: false
test:   true
